
name: YMS Build and Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 1.8
        uses: actions/setup-java@v2
        with:
          java-version: 1.8
      - name: Publish package
        run:  mvn --batch-mode deploy
        env:
          GITHUB_TOKEN: ${{ secrets.MAVEN_TOKEN }}

